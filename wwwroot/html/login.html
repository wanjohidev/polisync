<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>polisync</title>
    <link rel="stylesheet" href="/wwwroot/css/pico.min.css">
    <link rel="stylesheet" href="/wwwroot/css/login.css">
</head>

<body>
    <main class="login-layout">
        <section class="hero">
            <article>
                <img src="/wwwroot/assets/polisync_login_graphic.png" alt="polisync Illustration">
            </article>
        </section>

        <section class="login-panel">
            <article>
                <header>
                    <img src="/wwwroot/assets/polisync_logo.png" alt="polisync logo">
                    <h4>Log in</h4>
                </header>

                <form id="loginForm">
                    <label for="username">Email: 
                        <input type="email" id="username" placeholder="your@example.com"  required>
                    </label>
                    <label for="password">Password: 
                        <input type="password" id="password" placeholder="Password" required>
                    </label>
                    <button type="submit">
                        Log in
                    </button>
                </form>
            </article>
        </section>
    </main>
    
<script src="/wwwroot/js/login.js"></script>

</body>
</html>
