<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>polisync</title>
    <link rel="stylesheet" href="/wwwroot/css/login.css">
</head>

<body>
    <div class="split left">
        <div class="centered">
            <img src="/wwwroot/assets/polisync_login_graphic.png" alt="polisync login graphic" class="login-graphic">
        </div>
        
    </div>




    <div class="split right">
        <div class="centered login">
            <img src="/wwwroot/assets/polisync_logo.png" alt="polisync logo" class="logo" >

            <h2>Log in to your account</h2>
            
            <label>Email: </label>
            <input class="input" type="email" placeholder="user@example.com"/>
            <label>Password: </label>
            <input class="input"  type="text" placeholder="Password"/>

            <button type="submit">Login</button>
        </div>
        
    </div>
</body>

<script></script>
</html>
